    const pct=(correct/total)*100,passed=pct>=65;
    const [showWrong,setShowWrong]=useState(false);

    const ds={};
    questions.forEach((q,i)=>{
      if(!ds[q.domain]) ds[q.domain]={c:0,t:0};
      ds[q.domain].t++;
      if(answers[i]===q.correct) ds[q.domain].c++;
    });
    const wrong=questions.map((q,i)=>({q,i,yours:answers[i]})).filter(x=>x.yours!==x.q.correct);

    return(
      <div style={{maxWidth:720,margin:"0 auto",padding:"44px 20px"}}>
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #e4e4e7",padding:"36px 40px",boxShadow:"0 2px 14px rgba(0,0,0,0.06)",marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:12}}>{passed?"🎉":"📊"}</div>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(1.6rem,4vw,2.4rem)",color:"#18181b",margin:"0 0 6px",fontWeight:400,letterSpacing:-0.3}}>{passed?"Examination Passed":"Examination Complete"}</h2>
          <p style={{color:"#71717a",fontSize:15,margin:"0 0 28px"}}>{passed?"Congratulations — you met the 65% passing threshold.":"You need 65% to pass. Review your weak domains below."}</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:24,background:passed?"#f0fdf4":"#fef2f2",border:`2px solid ${passed?"#86efac":"#fca5a5"}`,borderRadius:14,padding:"20px 36px"}}>
            <div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:48,fontWeight:600,color:passed?"#15803d":"#dc2626",lineHeight:1}}>{pct.toFixed(1)}%</div>
              <div style={{color:"#71717a",fontSize:13,marginTop:5}}>{correct} of {total} correct</div>
            </div>
            <div style={{width:1,height:52,background:passed?"#86efac":"#fca5a5"}}/>
            <div>
              <div style={{fontWeight:800,fontSize:20,color:passed?"#15803d":"#dc2626"}}>{passed?"PASS":"FAIL"}</div>
              <div style={{color:"#71717a",fontSize:12,marginTop:3}}>Threshold: 65%</div>
            </div>
          </div>
        </div>

        <div style={{background:"#fff",borderRadius:14,border:"1px solid #e4e4e7",padding:"24px 28px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
          <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#18181b",margin:"0 0 18px",fontWeight:400}}>Domain Breakdown</h3>
          {Object.entries(ds).map(([domain,stat])=>{
            const dp=(stat.c/stat.t)*100;
            return(
              <div key={domain} style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <Tag domain={domain}/>
                <div style={{flex:1,height:10,background:"#f4f4f5",borderRadius:5,overflow:"hidden"}}>
                  <div style={{width:`${dp}%`,height:"100%",background:PRI,borderRadius:5}}/>
                </div>
                <span style={{fontWeight:700,fontSize:13,color:"#374151",minWidth:42,textAlign:"right"}}>{dp.toFixed(0)}%</span>
                <span style={{color:"#a1a1aa",fontSize:12,minWidth:36}}>{stat.c}/{stat.t}</span>
              </div>
            );
          })}
        </div>

        <button onClick={()=>setShowWrong(s=>!s)} style={{width:"100%",background:"#fff",border:"1px solid #e4e4e7",borderRadius:10,padding:"13px 20px",color:"#374151",fontSize:14,fontWeight:500,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
          <span>Review Incorrect Answers ({wrong.length})</span>
          <span style={{color:"#a1a1aa"}}>{showWrong?"▲":"▼"}</span>
        </button>

        {showWrong&&(
          <div style={{display:"grid",gap:10,marginBottom:14}}>
            {wrong.map(({q,i,yours})=>(
              <div key={i} style={{background:"#fff",border:"1px solid #fca5a5",borderRadius:10,padding:"16px 18px"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10,flexWrap:"wrap"}}>
                  <Tag domain={q.domain}/>
                  <p style={{color:"#18181b",fontSize:13,margin:0,lineHeight:1.6,fontWeight:500,width:"100%"}}>{q.question}</p>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,padding:"4px 10px",borderRadius:6,background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",fontWeight:500}}>✗ {yours!==undefined?q.options[yours]:"Not answered"}</span>
                  <span style={{fontSize:12,padding:"4px 10px",borderRadius:6,background:"#dcfce7",color:"#15803d",border:"1px solid #86efac",fontWeight:500}}>✓ {q.options[q.correct]}</span>
                </div>
                <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderLeft:"3px solid #d97706",borderRadius:"0 8px 8px 0",padding:"9px 13px"}}>
                  <p style={{color:"#78350f",fontSize:12,margin:0}}>💡 {q.explanation}</p>
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <button onClick={onRetry} style={{background:PRI,border:"none",borderRadius:10,padding:"15px",color:"white",fontSize:15,fontWeight:700,transition:"background 0.15s"}}
            onMouseOver={e=>e.currentTarget.style.background=PRI2}
            onMouseOut={e=>e.currentTarget.style.background=PRI}>Retake Exam</button>
          <button onClick={onHome} style={{background:"#fafafa",border:"1px solid #e4e4e7",borderRadius:10,padding:"15px",color:"#374151",fontSize:15,fontWeight:500}}>← Back to Home</button>
        </div>
      </div>
    );
  }

  function App(){
    const [screen,setScreen]=useState("home");
    const [result,setResult]=useState(null);
    const [lastResult,setLastResult]=useState(null);
    const [selectedDomain,setSelectedDomain]=useState("All");

    function handleFinish(r){
      const pct=(r.correct/r.total)*100;
      setLastResult({...r,pct,passed:pct>=65});
      setResult(r);
      setScreen("results");
    }

    return(
      <div style={{minHeight:"100vh",background:"#f4f4f5"}}>
        <Nav screen={screen} setScreen={setScreen}/>
        {screen==="home"    && <Home onStart={()=>setScreen("exam")} onStudy={()=>setScreen("study")} onReview={()=>setScreen("review")} lastResult={lastResult} selectedDomain={selectedDomain} setSelectedDomain={setSelectedDomain}/>}
        {screen==="study"   && <Study/>}
        {screen==="review"  && <Review/>}
        {screen==="exam"    && <Exam onFinish={handleFinish} selectedDomain={selectedDomain}/>}
        {screen==="results" && result && <Results result={result} onRetry={()=>setScreen("exam")} onHome={()=>setScreen("home")}/>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
